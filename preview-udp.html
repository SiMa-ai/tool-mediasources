<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MediaMTX UDP Preview Grid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --tile-height: 180px;
      --gap: 10px;
      --accent: #2c78c4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f7f8fa;
      color: #111;
    }

    header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e6e7ea;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
      justify-content: space-between;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .controls label {
      font-size: 0.9rem;
      color: #555;
      margin-right: 4px;
    }

    input[type="text"], input[type="number"] {
      padding: 8px 10px;
      border: 1px solid #ccd1d7;
      border-radius: 6px;
      min-width: 140px;
      background: #fff;
    }

    input[type="range"] {
      width: 160px;
    }

    button {
      padding: 8px 14px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    main {
      padding: 12px;
    }

    .grid {
      display: grid;
      gap: var(--gap);
      grid-template-columns: repeat(4, 1fr);
    }

    .tile {
      background: #fff;
      border: 1px solid #e0e3e8;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #f2f5f8;
      border-bottom: 1px solid #e6e7ea;
      font-size: 0.9rem;
    }

    .tile-header .name {
      color: #333;
      font-weight: 400;
    }

    .tile-header a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .tile iframe {
      width: 100%;
      height: var(--tile-height);
      border: none;
      display: block;
      background: #000;
    }

    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="controls">
    <label for="baseUrl">Base URL</label>
    <input id="baseUrl" type="text" value="http://127.0.0.1" />

    <label for="port">Port</label>
    <input id="port" type="number" value="8889" min="1" max="65535" />

    <label for="pathPrefix">Prefix</label>
    <input id="pathPrefix" type="text" value="udp" />

    <label for="streamCount">Streams</label>
    <input id="streamCount" type="number" value="1" min="1" max="64" />

    <button id="connectBtn">Connect</button>
    <button id="reloadBtn" class="secondary">Reload All</button>
  </div>

  <div class="controls">
    <label for="heightRange">Tile height</label>
    <input id="heightRange" type="range" min="120" max="360" step="10" value="180" />
    <span id="heightVal">180px</span>
  </div>
</header>

<main>
  <div id="grid" class="grid" data-loaded="false"></div>
</main>

<script src="preview-udp-config.js"></script>
<script>
  const grid = document.getElementById('grid');
  const baseUrlInput = document.getElementById('baseUrl');
  const portInput = document.getElementById('port');
  const pathPrefixInput = document.getElementById('pathPrefix');
  const streamCountInput = document.getElementById('streamCount');
  const connectBtn = document.getElementById('connectBtn');
  const reloadBtn = document.getElementById('reloadBtn');
  const heightRange = document.getElementById('heightRange');
  const heightVal = document.getElementById('heightVal');

  const RUNTIME_CFG = window.MEDIASRC_UDP_CONFIG || {};
  const LS_BASE = 'mediamtx_udp_baseUrl';
  const LS_PORT = 'mediamtx_udp_port';
  const LS_PREFIX = 'mediamtx_udp_pathPrefix';
  const LS_STREAMS = 'mediamtx_udp_streamCount';
  const LS_HEIGHT = 'mediamtx_udp_tileHeight';
  let currentSignature = '';

  function restoreSettings() {
    const savedBase = localStorage.getItem(LS_BASE);
    const savedPort = localStorage.getItem(LS_PORT);
    const savedPrefix = localStorage.getItem(LS_PREFIX);
    const savedStreams = localStorage.getItem(LS_STREAMS);
    const savedHeight = localStorage.getItem(LS_HEIGHT);

    if (savedBase) baseUrlInput.value = savedBase;
    if (savedPort) portInput.value = savedPort;
    if (savedPrefix) pathPrefixInput.value = savedPrefix;
    if (savedStreams) streamCountInput.value = savedStreams;

    if (typeof RUNTIME_CFG.baseUrl === 'string' && RUNTIME_CFG.baseUrl) {
      baseUrlInput.value = RUNTIME_CFG.baseUrl;
    }
    if (Number.isInteger(RUNTIME_CFG.port) && RUNTIME_CFG.port > 0) {
      portInput.value = String(RUNTIME_CFG.port);
    }
    if (typeof RUNTIME_CFG.pathPrefix === 'string' && RUNTIME_CFG.pathPrefix) {
      pathPrefixInput.value = RUNTIME_CFG.pathPrefix;
    }
    if (Number.isInteger(RUNTIME_CFG.streamCount) && RUNTIME_CFG.streamCount > 0) {
      streamCountInput.value = String(RUNTIME_CFG.streamCount);
    }

    if (savedHeight) {
      heightRange.value = savedHeight;
    }
    applyTileHeight(heightRange.value);
  }

  function saveSettings() {
    localStorage.setItem(LS_BASE, baseUrlInput.value);
    localStorage.setItem(LS_PORT, portInput.value);
    localStorage.setItem(LS_PREFIX, pathPrefixInput.value);
    localStorage.setItem(LS_STREAMS, streamCountInput.value);
    localStorage.setItem(LS_HEIGHT, heightRange.value);
  }

  function getStreamCount() {
    const count = parseInt(streamCountInput.value, 10);
    if (!Number.isInteger(count) || count < 1) return 1;
    return Math.min(count, 64);
  }

  function getPathPrefix() {
    const prefix = pathPrefixInput.value.trim();
    return prefix || 'udp';
  }

  function buildSrc(index) {
    const base = baseUrlInput.value.replace(/\/+$/, '');
    const port = portInput.value;
    return `${base}:${port}/${getPathPrefix()}${index}/`;
  }

  function buildSignature() {
    return `${baseUrlInput.value}|${portInput.value}|${getPathPrefix()}|${getStreamCount()}`;
  }

  function populateGrid() {
    const targetCount = getStreamCount();
    const prefix = getPathPrefix();
    const signature = buildSignature();
    if (grid.dataset.loaded === 'true' && currentSignature === signature) {
      return;
    }

    grid.innerHTML = '';
    for (let i = 0; i < targetCount; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';

      const header = document.createElement('div');
      header.className = 'tile-header';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = `${prefix}${i}`;

      const openLink = document.createElement('a');
      openLink.href = buildSrc(i);
      openLink.target = '_blank';
      openLink.rel = 'noopener';
      openLink.textContent = 'Open';

      header.appendChild(name);
      header.appendChild(openLink);

      const frame = document.createElement('iframe');
      frame.dataset.index = i;
      frame.src = buildSrc(i);

      tile.appendChild(header);
      tile.appendChild(frame);
      grid.appendChild(tile);
    }

    currentSignature = signature;
    grid.dataset.loaded = 'true';
  }

  function reloadAll() {
    document.querySelectorAll('iframe').forEach((frame) => {
      const index = Number(frame.dataset.index);
      frame.src = buildSrc(index);
    });
  }

  function applyTileHeight(height) {
    document.documentElement.style.setProperty('--tile-height', `${height}px`);
    heightVal.textContent = `${height}px`;
  }

  connectBtn.addEventListener('click', () => {
    saveSettings();
    populateGrid();
  });

  reloadBtn.addEventListener('click', reloadAll);

  heightRange.addEventListener('input', () => {
    applyTileHeight(heightRange.value);
    saveSettings();
  });

  [baseUrlInput, portInput, pathPrefixInput, streamCountInput].forEach((input) => {
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        saveSettings();
        populateGrid();
      }
    });
  });

  restoreSettings();
  populateGrid();
</script>
</body>
</html>
